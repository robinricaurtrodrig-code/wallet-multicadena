name: wallet_multicadena
description: Wallet descentralizada multicadena para criptomonedas
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.18.0
  cloud_firestore: ^4.15.0
  firebase_messaging: ^14.7.0
  firebase_app_check: ^0.2.2

  # State Management
  provider: ^6.1.1

  # Networking
  http: ^1.2.1
  web3dart: ^2.7.3

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Crypto
  bip39: ^1.0.6
  bip32: ^2.0.0
  pointycastle: ^3.7.3
  hex: ^0.2.0
  convert: ^3.1.1
  cryptography: ^2.7.0
  crypto: ^3.0.2
  ed25519_hd_key: ^2.3.0

  # UI
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.0
  local_auth: ^2.1.8
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.20.2
  url_launcher: ^6.2.4

  # Utils
  connectivity_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
